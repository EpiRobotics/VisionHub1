# VisionHub Project Configuration Example (PatchCore Surface Inspection)
# Copy to DATA_ROOT/projects/<project_id>/project.yaml

project_id: side_a
display_name: "Side A - Scratch & Foreign Object"
enabled: true

io:
  tcp_port: 9101
  bind_host: "0.0.0.0"
  allow_ips: ["192.168.0.0/16", "127.0.0.1/32"]
  output_dir: "${DATA_ROOT}/projects/side_a/runs"

image:
  file_ready:
    mode: "size_stable"         # size_stable / open_retry
    stable_checks: 3
    stable_interval_ms: 50
    timeout_ms: 1500
  color: "rgb"                  # rgb / gray
  rotate: 0
  roi:
    enabled: false
    x: 0
    y: 0
    w: 2050
    h: 350

pipeline:
  algo: "patchcore_tiling_v1"
  model:
    active: "${PROJECT_DIR}/active_model.json"
  preprocess:
    normalize: "imagenet"
    align:
      enabled: false
  infer:
    device: "cuda"
    tile:
      tile_w: 512
      tile_h: 352
      stride_w: 384           # overlap = tile_w - stride_w = 128px
      stride_h: 352
    batch_tiles: 8
  postprocess:
    decision:
      score_method: "q999"      # heatmap quantile for image-level score
      threshold: "from_model"   # from_model / fixed
    export:
      # --- Speed note ---
      # With all saves OFF + overlay_output_path set, save time is ~50-100ms
      # With all saves ON, save time can be ~3000ms (matplotlib is slow)
      save_heatmap_png: false       # matplotlib heatmap (slow ~1-2s), turn on only for debug
      save_u16: false               # 16-bit score map, turn on only for debug
      save_mask: false              # binary mask, turn on only for debug
      save_overlay: false           # per-job overlay to artifacts dir (use overlay_output_path instead)
      heatmap_vmin: 0.0
      heatmap_vmax_mode: "thr_scale"   # thr_scale / fixed / auto
      heatmap_vmax: 1.0
      heatmap_vmax_scale: 1.2
      mask_thr_scale: 0.85
      dilate_px: 10
      close_px: 6
      regions:
        enabled: true
        min_area_px: 80
        max_regions: 10
        output_format: "json"

  # PatchCore-specific training parameters
  # These are used by the train endpoint and can be overridden per-project.
  _train:
    backbone: "resnet18"          # resnet18 / resnet50
    layers: "layer2,layer3"       # feature layers to extract
    pretrained: true              # use ImageNet pretrained weights
    proj_dim: 128                 # random projection dim (0 = disabled)
    max_patches_per_tile: 256     # patches sampled per tile for memory bank
    memory_size: 20000            # final memory bank size
    batch_size: 16                # training batch size
    num_workers: 2                # data loader workers
    pad_mode: "edge"              # edge / reflect / constant
    use_faiss: true               # use faiss for kNN (faster)
    compute_threshold: true       # auto-compute threshold from OK set
    ok_quantile: 0.999            # quantile of OK scores
    thr_scale: 1.10               # scale factor on quantile
    pixel_mm: 0.05                # mm per pixel (for defect size calc)
    defect_mm_min: 2.0            # minimum defect size in mm
